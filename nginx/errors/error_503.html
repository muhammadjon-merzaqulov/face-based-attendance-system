<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>503 - Service Unavailable | AttendAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full bg-slate-50 text-slate-800 antialiased flex flex-col items-center justify-center relative overflow-hidden">
  
  <!-- Minimal Header Mock -->
  <div class="fixed top-0 left-0 w-full bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between z-10">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      </div>
      <h1 class="text-blue-900 font-bold text-lg">AttendAI</h1>
    </div>
  </div>

  <div class="relative z-10 bg-white rounded-2xl shadow-sm border border-slate-200 p-10 max-w-lg w-full text-center mt-12 mx-4">
    <div class="flex justify-center mb-6">
      <div class="w-20 h-20 bg-rose-100 rounded-full flex items-center justify-center border border-rose-200">
        <svg class="w-10 h-10 text-rose-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
    </div>
    
    <h1 class="text-6xl font-extrabold text-blue-900 mb-2">503</h1>
    <h2 class="text-xl font-bold text-slate-800 mb-4">Service Unavailable</h2>
    
    <p class="text-slate-500 mb-8 text-sm">
      Our servers are currently undergoing maintenance or are temporarily overloaded. We're actively working to restore access as soon as possible.
    </p>

    <button onclick="window.location.reload()" class="inline-flex items-center gap-2 px-6 py-2.5 bg-blue-900 hover:bg-blue-800 text-white rounded-lg font-medium transition-colors shadow-sm text-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
      Try Again
    </button>
  </div>
</body>
</html>
